<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Agreement - Your Car</title>
    <link rel="stylesheet" href="style.css">
</head>
<body dir="ltr">

    <header>
        <div class="logo">
            <h1>Your Car</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cars.html">Cars</a></li>
                <li><a href="checkout.html">Booking</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="branches.html">Branches</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="agreement-wrapper">
            <h2>Sign The Agreement</h2>
            <form class="booking-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Car Name</label>
                    <input type="text" required placeholder="Car Name">
                </div>
                <div class="form-group">
                    <label>Car Model</label>
                    <input type="text" required placeholder="Car Model">
                </div>
                <div class="form-group">
                    <label>Paid Sum</label>
                    <input type="number" required placeholder="Paid Sum">
                </div>
                <div class="form-terms">
                    <h3>Note!</h3>
                    <p>By submitting this agreement, you acknowledge that you have read and accepted all terms.</p>
                    <div class="check-item">
                        <input type="checkbox" id="agree" required>
                        <label for="agree">I agree to the terms</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Car</p>
    </footer>
<script src="script.js"></script>
</body>
</html>
